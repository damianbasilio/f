<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Facebook Leads</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f5;
      --surface: #ffffff;
      --text: #141414;
      --muted: #5c5c5c;
      --border: #deded9;
      --accent: #2d4a3e;
      --accent-soft: #e8f0ec;
      --accent-text: #ffffff;
      --danger: #9b2c2c;
      --radius: 8px;
      --font: system-ui, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f0f;
        --surface: #171717;
        --text: #ececec;
        --muted: #9a9a9a;
        --border: #2e2e2e;
        --accent: #7a9e8e;
        --accent-soft: #1a2822;
        --accent-text: #0f0f0f;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }
    .btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: var(--radius);
      padding: 0.625rem 1rem;
      font: inherit;
      cursor: pointer;
    }
    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-text);
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }
    .login-card {
      width: min(100%, 22rem);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    }
    .login-card h1 {
      margin: 0 0 0.25rem;
      font-size: 1.25rem;
    }
    .login-card p {
      margin: 0 0 1.25rem;
      color: var(--muted);
      font-size: 0.875rem;
    }
    .login-field {
      display: grid;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }
    .login-field label {
      font-size: 0.8125rem;
      color: var(--muted);
    }
    .login-field input {
      width: 100%;
      padding: 0.625rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font: inherit;
    }
    .login-field input:focus {
      outline: 2px solid var(--accent-soft);
      border-color: var(--accent);
    }
    .login-error {
      color: var(--danger);
      font-size: 0.8125rem;
      min-height: 1.25rem;
      margin-bottom: 0.75rem;
    }
    .login-card .btn {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <form class="login-card" id="loginForm" method="post" action="/api/auth/login">
      <h1>Facebook Leads</h1>
      <p>Enter the dashboard password to continue.</p>
      <div class="login-field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required autofocus />
      </div>
      <p class="login-error" id="loginError" role="alert"></p>
      <button type="submit" class="btn primary" id="loginBtn">Sign in</button>
    </form>
  </div>
  <script>
    const form = document.getElementById("loginForm");
    const errorEl = document.getElementById("loginError");
    const btn = document.getElementById("loginBtn");
    const params = new URLSearchParams(window.location.search);
    const nextPath = params.get("next") || "/";

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.textContent = "";
      btn.disabled = true;
      try {
        const r = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ password: document.getElementById("password").value }),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) {
          if (r.status === 429 && data.retryAfterSec) {
            errorEl.textContent = `Too many attempts. Try again in ${data.retryAfterSec}s.`;
          } else {
            errorEl.textContent = data.error || "Sign in failed";
          }
          return;
        }
        window.location.href = nextPath.startsWith("/") && !nextPath.startsWith("//") ? nextPath : "/";
      } catch {
        errorEl.textContent = "Network error — try again";
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
